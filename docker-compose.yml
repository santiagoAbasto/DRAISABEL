services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: centro_estetico_app
    working_dir: /var/www/html
    volumes:
      - app_code:/var/www/html
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/vendor/autoload.php && php-fpm -t >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  vite:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: centro_estetico_vite
    working_dir: /var/www/html
    command:
      - sh
      - -lc
      - rm -f storage/framework/share-mode && npm run dev -- --host 0.0.0.0
    volumes:
      - app_code:/var/www/html
    ports:
      - "5174:5174"
    depends_on:
      app:
        condition: service_healthy
    
  nginx:
    image: nginx:alpine
    container_name: centro_estetico_nginx
    ports:
      - "8010:80"
    volumes:
      - app_code:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: centro_estetico_db
    environment:
      POSTGRES_DB: centro_estetico
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    container_name: centro_estetico_mailhog
    ports:
      - "8026:8025"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: centro_estetico_cloudflared
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARED_TOKEN:-}"]
    depends_on:
      nginx:
        condition: service_started
    profiles:
      - cloudflare
    restart: unless-stopped

  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    container_name: centro_estetico_cloudflared_quick
    command: ["tunnel", "--no-autoupdate", "--url", "http://nginx:80"]
    depends_on:
      share-assets:
        condition: service_completed_successfully
      nginx:
        condition: service_started
    profiles:
      - share
    restart: unless-stopped

  share-assets:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: centro_estetico_share_assets
    working_dir: /var/www/html
    command:
      - sh
      - -lc
      - touch storage/framework/share-mode && rm -f public/hot && rm -rf public/build && npm run build && rm -f public/hot
    volumes:
      - app_code:/var/www/html
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - share

volumes:
  pgdata:
  app_code:
