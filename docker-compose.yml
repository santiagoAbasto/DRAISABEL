services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: centro_estetico_app
    working_dir: /var/www/html
    volumes:
      - app_code:/var/www/html
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/vendor/autoload.php && php-fpm -t >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  vite:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: centro_estetico_vite
    working_dir: /var/www/html
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - app_code:/var/www/html
    ports:
      - "5174:5174"
    depends_on:
      app:
        condition: service_healthy
    
  nginx:
    image: nginx:alpine
    container_name: centro_estetico_nginx
    ports:
      - "8010:80"
    volumes:
      - app_code:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: centro_estetico_db
    environment:
      POSTGRES_DB: centro_estetico
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    container_name: centro_estetico_mailhog
    ports:
      - "8026:8025"

volumes:
  pgdata:
  app_code:
